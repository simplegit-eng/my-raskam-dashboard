<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASKAM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --bg-main: #020617;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.05);
            --text-main: #cbd5e1;
            --text-heading: #ffffff;
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.2);
        }

        body.light {
            --bg-main: #f8fafc;
            --bg-glass: rgba(0, 0, 0, 0.03);
            --border-glass: rgba(0, 0, 0, 0.1);
            --text-main: #334155;
            --text-heading: #0f172a;
        }

        body.midnight {
            --bg-main: #000000;
            --bg-glass: rgba(30, 41, 59, 0.5);
            --border-glass: rgba(255, 255, 255, 0.03);
            --text-main: #94a3b8;
            --text-heading: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass { background: var(--bg-glass); backdrop-filter: blur(12px); border: 1px solid var(--border-glass); }
        
        iframe { border: none; background: white; width: 100%; height: 100%; border-radius: 0 0 12px 12px; }
        
        .active-nav { background: var(--accent-glow); border-color: var(--accent-color); color: var(--text-heading); }
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        
        #toast {
            position: fixed; bottom: 20px; right: 20px; 
            padding: 12px 20px; border-radius: 12px;
            background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(100px); transition: transform 0.3s ease; z-index: 1000;
        }
        #toast.show { transform: translateY(0); }

        .monogram-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #settings-modal.active { display: flex; }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        #history-panel { display: none; }
        .view-mode #history-panel { display: flex; }
        .view-mode #scratchpad, .view-mode #save-btn { display: none; }

        /* Analog Clock Styling */
        .analog-clock {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid var(--text-main);
            position: relative;
            background: var(--bg-glass);
        }
        .clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: var(--text-heading);
            border-radius: 4px;
        }
        .hour-hand { width: 2px; height: 10px; z-index: 3; }
        .min-hand { width: 1.5px; height: 14px; z-index: 2; opacity: 0.8; }
        .sec-hand { width: 1px; height: 16px; background: var(--accent-color); z-index: 1; }
        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
        }

        .tool-tile { display: none; }
        .tool-tile.active { display: block; }

        @keyframes pulse-alarm {
            0% { box-shadow: 0 0 0 0px var(--accent-color); }
            70% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0px rgba(79, 70, 229, 0); }
        }
        .alarm-ringing { animation: pulse-alarm 1s infinite; border-color: var(--accent-color) !important; background: var(--accent-glow) !important; }
    </style>
</head>
<body class="h-screen w-screen flex overflow-hidden">

    <!-- Settings Modal -->
    <div id="settings-modal" onclick="if(event.target === this) toggleSettings()">
        <div class="glass w-full max-w-xl p-6 rounded-3xl border border-white/10 shadow-2xl space-y-6 max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-black uppercase tracking-widest text-heading" style="color: var(--text-heading)">Dashboard Settings</h2>
                <button onclick="toggleSettings()" class="p-2 hover:bg-white/10 rounded-full"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-6">
                <!-- Theme/Accent -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">Theme Mode</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setTheme('dark')" class="p-2 rounded-lg border border-white/5 bg-white/5 text-[9px] font-bold hover:bg-white/10">DARK</button>
                            <button onclick="setTheme('light')" class="p-2 rounded-lg border border-white/5 bg-white/5 text-[9px] font-bold hover:bg-white/10">LIGHT</button>
                            <button onclick="setTheme('midnight')" class="p-2 rounded-lg border border-white/5 bg-white/5 text-[9px] font-bold hover:bg-white/10">MID</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">Accent Color</label>
                        <div class="flex flex-wrap gap-2 items-center bg-black/20 p-2 rounded-xl border border-white/5">
                            <div class="color-dot" style="background: #4f46e5;" onclick="setAccent('#4f46e5')"></div>
                            <div class="color-dot" style="background: #e11d48;" onclick="setAccent('#e11d48')"></div>
                            <div class="color-dot" style="background: #10b981;" onclick="setAccent('#10b981')"></div>
                            <div class="color-dot" style="background: #f59e0b;" onclick="setAccent('#f59e0b')"></div>
                            <div class="color-dot" style="background: #0ea5e9;" onclick="setAccent('#0ea5e9')"></div>
                            <div class="w-px h-4 bg-white/10 mx-1"></div>
                            <input type="color" id="accent-picker" oninput="setAccent(this.value)" class="w-6 h-6 rounded-full cursor-pointer bg-transparent border-none p-0 overflow-hidden">
                            <span id="accent-hex" class="font-mono text-[10px] uppercase opacity-60 ml-1">#4f46e5</span>
                        </div>
                    </div>
                </div>

                <!-- Navigation Management -->
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 mb-3 block tracking-widest">Edit Navigation Slots</label>
                    <div id="edit-slots-container" class="space-y-3"></div>
                </div>
            </div>

            <div class="pt-4 border-t border-white/5 flex justify-end">
                <button onclick="toggleSettings()" class="px-6 py-2 bg-accent rounded-xl text-white font-bold text-xs uppercase tracking-widest shadow-lg">Save & Close</button>
            </div>
        </div>
    </div>

    <!-- Sidebar Left: Tools -->
    <aside class="w-64 border-r border-white/5 flex flex-col p-4 space-y-4 glass z-20">
        <div class="flex flex-col gap-3 px-2 mb-2">
            <div class="flex items-center gap-3">
                <div class="monogram-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 20V4H12C15.3137 4 18 6.68629 18 10C18 12.8358 16.0339 15.212 13.3503 15.8231L18 20H14.5L10.5 16H8V20H4ZM8 12H12C13.1046 12 14 11.1046 14 10C14 8.89543 13.1046 8 12 8H8V12Z" fill="white"/>
                    </svg>
                </div>
                <h1 class="text-sm font-black tracking-widest text-heading uppercase" style="color: var(--text-heading)">RASKAM</h1>
            </div>
            
            <!-- Quick Tools Selector -->
            <div class="relative group mt-1">
                <select id="tool-selector" onchange="switchTool(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-[10px] font-black uppercase tracking-widest text-slate-400 appearance-none cursor-pointer hover:bg-white/10 transition-all outline-none">
                    <option value="world-time">World Time</option>
                    <option value="calculator">Calculator</option>
                    <option value="measure">Measure</option>
                    <option value="currency">Currency</option>
                    <option value="health">Health Timer</option>
                </select>
                <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-[8px] text-slate-500">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <div class="flex-1 space-y-4 overflow-y-auto no-scrollbar pr-1">
            <!-- Calendar Widget (Always visible) -->
            <div class="bg-white/5 rounded-2xl p-3 border border-white/5 shadow-sm">
                <div id="calendar-header" class="text-[10px] font-bold text-accent uppercase tracking-wider mb-2 flex justify-between">
                    <span id="cal-month-year"></span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center"></div>
            </div>

            <!-- World Clock Tile -->
            <div id="tile-world-time" class="tool-tile active bg-white/5 rounded-2xl p-3 border border-white/5 shadow-sm">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-clock text-[12px] text-accent"></i>
                    <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">World Time</span>
                </div>
                <div id="world-clocks" class="space-y-3"></div>
            </div>

            <!-- Calculator Tile -->
            <div id="tile-calculator" class="tool-tile bg-white/5 rounded-2xl p-3 border border-white/5 shadow-sm">
                <div class="text-right mb-2 pr-1">
                    <div id="calc-eq" class="text-[9px] text-slate-500 font-mono truncate h-3">0</div>
                    <div id="calc-display" class="text-lg font-bold text-heading truncate" style="color: var(--text-heading)">0</div>
                </div>
                <div class="grid grid-cols-4 gap-1" id="calc-btns"></div>
            </div>

            <!-- Unit Converter Tile -->
            <div id="tile-measure" class="tool-tile bg-white/5 rounded-2xl p-3 border border-white/5 shadow-sm">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-ruler-combined text-[12px] text-accent"></i>
                    <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">Measure</span>
                </div>
                <div class="flex gap-1 mb-2">
                    <input type="number" id="unit-input" placeholder="Val" class="w-full bg-black/20 border border-white/5 rounded-lg px-2 py-1 text-[10px] font-bold text-heading outline-none" style="color: var(--text-heading)">
                    <select id="unit-from" class="bg-black/20 border border-white/5 rounded-lg text-[9px] font-bold text-slate-400 outline-none p-1">
                        <option value="ft">FT</option>
                        <option value="in">IN</option>
                        <option value="m">M</option>
                    </select>
                </div>
                <div id="unit-result" class="text-[9px] font-mono text-accent bg-white/5 rounded-lg py-1.5 px-2 flex justify-between gap-1 overflow-hidden">
                    <span>-</span><span>-</span><span>-</span>
                </div>
            </div>

            <!-- Currency Exchange Tile -->
            <div id="tile-currency" class="tool-tile bg-white/5 rounded-2xl p-3 border border-white/5 shadow-sm">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-coins text-[12px] text-accent"></i>
                    <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">Currency</span>
                </div>
                <div class="space-y-2">
                    <div class="flex gap-1">
                        <input type="number" id="curr-input" value="1" class="w-full bg-black/20 border border-white/5 rounded-lg px-2 py-1 text-[10px] font-bold text-heading outline-none" style="color: var(--text-heading)">
                        <select id="curr-from" class="bg-black/20 border border-white/5 rounded-lg text-[9px] font-bold text-slate-400 outline-none p-1">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="INR">INR</option>
                            <option value="JPY">JPY</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 gap-1" id="curr-results">
                        <!-- Results injected via JS -->
                    </div>
                </div>
            </div>

            <!-- Health Timer Tile -->
            <div id="tile-health" class="tool-tile bg-white/5 rounded-2xl p-3 border border-white/5 shadow-sm">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-heartbeat text-[12px] text-accent"></i>
                    <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">Health Timer</span>
                </div>
                <div id="health-timer-container" class="space-y-2 transition-all">
                    <!-- Manual Select Input -->
                    <div class="flex gap-1">
                        <div class="relative flex-1">
                            <input type="number" id="health-custom-mins" placeholder="Mins" min="1" max="999" class="w-full bg-black/20 border border-white/5 rounded-lg px-2 py-1.5 text-[10px] font-bold text-heading outline-none focus:border-accent/50 transition-all" style="color: var(--text-heading)">
                            <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-slate-500 font-bold pointer-events-none">MIN</span>
                        </div>
                        <button onclick="applyHealthCustom()" class="px-2 bg-accent/20 text-accent border border-accent/30 rounded-lg hover:bg-accent/30 transition-all">
                            <i class="fas fa-check text-[10px]"></i>
                        </button>
                    </div>

                    <div class="flex justify-between items-center bg-black/20 rounded-xl p-2 border border-white/5">
                        <span id="health-display" class="text-xl font-mono font-bold text-heading" style="color: var(--text-heading)">20:00</span>
                        <div class="flex gap-1">
                            <button id="health-toggle" onclick="toggleHealthTimer()" class="w-8 h-8 flex items-center justify-center bg-accent/20 border border-accent/30 rounded-lg text-accent hover:bg-accent/30"><i class="fas fa-play text-[10px]"></i></button>
                            <button onclick="resetHealthTimer()" class="w-8 h-8 flex items-center justify-center bg-white/5 border border-white/10 rounded-lg text-slate-400 hover:bg-white/10"><i class="fas fa-redo text-[10px]"></i></button>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="setHealthPreset(20)" class="flex-1 py-1 bg-white/5 rounded-lg text-[8px] font-bold uppercase tracking-tighter hover:bg-accent/10 transition-colors">20m (Eye)</button>
                        <button onclick="setHealthPreset(60)" class="flex-1 py-1 bg-white/5 rounded-lg text-[8px] font-bold uppercase tracking-tighter hover:bg-accent/10 transition-colors">1h (Water)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-3 border-t border-white/5">
            <button onclick="toggleSettings()" class="w-full p-2.5 bg-white/5 border border-white/5 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition-all">
                <i class="fas fa-cog text-sm"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Dashboard Settings</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative z-10">
        <header class="h-14 border-b border-white/5 flex items-center justify-between px-6 glass">
            <div class="flex items-center gap-3 overflow-hidden">
                <i id="current-icon" class="fas fa-globe text-accent"></i>
                <span id="current-url-display" class="text-xs font-semibold text-slate-400 truncate max-w-[400px]">Loading...</span>
            </div>
            <div class="flex gap-2">
                <button onclick="analyzeSite()" class="px-3 py-1.5 bg-accent/10 border border-accent/30 rounded-lg flex items-center gap-2 hover:bg-accent/20 transition-colors">
                    <i class="fas fa-sparkles text-accent"></i>
                    <span class="text-[10px] font-black uppercase">Analyze</span>
                </button>
                <button onclick="refreshFrame()" class="p-2 hover:bg-white/5 rounded-lg text-slate-400"><i class="fas fa-sync-alt text-xs"></i></button>
                <button onclick="openExternal()" class="p-2 hover:bg-white/5 rounded-lg text-slate-400"><i class="fas fa-expand text-xs"></i></button>
            </div>
        </header>
        <div class="flex-1 relative bg-slate-950/20">
            <iframe id="main-frame" src="about:blank"></iframe>
        </div>
    </main>

    <!-- Sidebar Right -->
    <aside id="right-sidebar" class="w-80 border-l border-white/5 flex flex-col glass z-20">
        <div class="p-4 border-b border-white/5">
            <h3 class="text-[10px] font-black uppercase text-slate-500 mb-3 tracking-widest">Navigation Slots</h3>
            <div class="space-y-2" id="nav-slots"></div>
        </div>

        <div class="flex-1 flex flex-col p-4 overflow-hidden">
            <div class="flex items-center justify-between mb-2 px-1">
                <div class="flex items-center gap-2">
                    <i class="fas fa-file-alt text-accent"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Scratchpad</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="toggleScratchpadMode()" id="scratchpad-mode-btn" class="text-[10px] font-black uppercase text-slate-500 hover:text-accent transition-colors">
                        <i class="fas fa-eye mr-1"></i>View
                    </button>
                    <button id="save-btn" onclick="saveNote()" class="text-[10px] font-black uppercase text-accent hover:opacity-70">
                        <i class="fas fa-save mr-1"></i>Save
                    </button>
                </div>
            </div>
            
            <textarea id="scratchpad" class="flex-1 bg-white/5 rounded-2xl p-4 text-[11px] font-mono resize-none focus:outline-none border border-white/5 text-slate-300 focus:border-accent/30 transition-all mb-4" placeholder="Capture thoughts..."></textarea>
            
            <div id="history-panel" class="flex-1 flex flex-col overflow-hidden">
                <div class="flex items-center justify-between px-1 mb-2">
                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-500">History Log</span>
                </div>
                <div id="note-history" class="flex-1 overflow-y-auto no-scrollbar space-y-2 pr-1"></div>
            </div>
        </div>
    </aside>

    <div id="toast">Changes saved.</div>

    <script>
        const DEFAULT_STATE = {
            sites: [
                "https://www.tamildailycalendar.com/tamil_daily_calendar.php", 
                "https://en.wikipedia.org/wiki/Main_Page", 
                "https://www.deccanherald.com/top-karnataka-news", 
                "https://akashvani.gov.in/radio/live.php"
            ],
            titles: ["Tamil Calendar", "Wikipedia", "Deccan Herald", "Vividh Bharati"],
            activeIdx: 0,
            activeTool: 'world-time',
            theme: 'dark',
            accent: '#4f46e5',
            notes: "",
            history: []
        };

        let state = JSON.parse(localStorage.getItem('omni_dashboard_state')) || DEFAULT_STATE;

        function updateState() { 
            localStorage.setItem('omni_dashboard_state', JSON.stringify(state)); 
            renderNav();
            renderHistory();
        }

        function switchTool(toolId) {
            state.activeTool = toolId;
            document.querySelectorAll('.tool-tile').forEach(tile => tile.classList.remove('active'));
            const target = document.getElementById(`tile-${toolId}`);
            if (target) target.classList.add('active');
            updateState();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if (msg) t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function setTheme(theme) {
            state.theme = theme;
            document.body.className = `h-screen w-screen flex overflow-hidden ${theme}`;
            updateState();
        }

        function setAccent(color) {
            state.accent = color;
            document.documentElement.style.setProperty('--accent-color', color);
            document.documentElement.style.setProperty('--accent-glow', color + '33');
            const hexText = document.getElementById('accent-hex');
            if (hexText) hexText.textContent = color;
            const picker = document.getElementById('accent-picker');
            if (picker) picker.value = color;
            
            document.querySelectorAll('.color-dot').forEach(dot => {
                const bg = dot.style.background;
                if (bg.includes(color) || dot.getAttribute('style').includes(color)) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
            updateState();
        }

        function updateSlot(idx, field, value) {
            if (field === 'title') state.titles[idx] = value;
            if (field === 'site') state.sites[idx] = value;
            updateState();
        }

        window.toggleSettings = () => {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                renderEditSlots();
                setAccent(state.accent);
            }
        };

        function renderEditSlots() {
            const container = document.getElementById('edit-slots-container');
            container.innerHTML = '';
            state.sites.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'bg-black/20 p-3 rounded-xl border border-white/5 space-y-2';
                row.innerHTML = `
                    <div class="flex items-center justify-between gap-2">
                        <span class="text-[9px] font-black text-accent uppercase">Slot ${i+1}</span>
                        <input type="text" value="${state.titles[i]}" oninput="updateSlot(${i}, 'title', this.value)" 
                               class="bg-transparent border-b border-white/10 text-[10px] font-bold outline-none text-heading w-full text-right" 
                               style="color: var(--text-heading)">
                    </div>
                    <input type="text" value="${state.sites[i]}" oninput="updateSlot(${i}, 'site', this.value)" 
                           class="w-full bg-black/40 border border-white/5 rounded-lg px-2 py-1 text-[9px] font-mono text-slate-400 outline-none">
                `;
                container.appendChild(row);
            });
        }

        function initCalendar() {
            const now = new Date();
            const grid = document.getElementById('calendar-grid');
            const header = document.getElementById('cal-month-year');
            header.textContent = now.toLocaleString('default', { month: 'short', year: 'numeric' });
            grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(d => {
                const el = document.createElement('div');
                el.className = 'text-[8px] text-slate-500 font-black';
                el.textContent = d;
                grid.appendChild(el);
            });
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let i=1; i<=daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = `text-[9px] p-0.5 rounded-md ${i === now.getDate() ? 'bg-accent text-white font-bold' : 'text-slate-400'}`;
                day.textContent = i;
                grid.appendChild(day);
            }
        }

        function initCalc() {
            const display = document.getElementById('calc-display');
            const btns = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','C'];
            const container = document.getElementById('calc-btns');
            let currentEq = "";
            btns.forEach(b => {
                const btn = document.createElement('button');
                btn.className = 'h-7 rounded-lg text-[10px] font-bold bg-white/5 hover:bg-accent transition-all';
                btn.textContent = b;
                btn.onclick = () => {
                    if (b === 'C') { currentEq = ""; display.textContent = "0"; }
                    else if (b === '=') { try { display.textContent = eval(currentEq); currentEq = display.textContent; } catch { display.textContent = "Err"; } }
                    else { currentEq += b; display.textContent = currentEq; }
                };
                container.appendChild(btn);
            });
        }

        function initCurrency() {
            const rates = { USD: 1, EUR: 0.92, GBP: 0.79, INR: 83.3, JPY: 151.6 };
            const container = document.getElementById('curr-results');
            const input = document.getElementById('curr-input');
            const fromSelect = document.getElementById('curr-from');

            const updateCurrency = () => {
                const val = parseFloat(input.value) || 0;
                const from = fromSelect.value;
                const baseVal = val / rates[from];
                
                container.innerHTML = '';
                Object.keys(rates).forEach(sym => {
                    if (sym === from) return;
                    const converted = (baseVal * rates[sym]).toLocaleString(undefined, { maximumFractionDigits: 2 });
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center bg-black/10 rounded-lg px-2 py-1 border border-white/5';
                    div.innerHTML = `
                        <span class="text-[8px] font-black text-slate-500">${sym}</span>
                        <span class="text-[10px] font-mono text-accent font-bold">${converted}</span>
                    `;
                    container.appendChild(div);
                });
            };

            input.oninput = updateCurrency;
            fromSelect.onchange = updateCurrency;
            updateCurrency();
        }

        // Health Timer Logic
        let healthTimer = null;
        let healthSeconds = 20 * 60;
        let healthRunning = false;

        function updateHealthDisplay() {
            const m = Math.floor(healthSeconds / 60);
            const s = healthSeconds % 60;
            document.getElementById('health-display').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function applyHealthCustom() {
            const input = document.getElementById('health-custom-mins');
            const mins = parseInt(input.value);
            if (!isNaN(mins) && mins > 0) {
                setHealthPreset(mins);
                showToast(`Timer set to ${mins}m`);
                input.value = "";
            }
        }

        function toggleHealthTimer() {
            const btn = document.getElementById('health-toggle');
            const container = document.getElementById('health-timer-container');
            if (healthRunning) {
                clearInterval(healthTimer);
                btn.innerHTML = '<i class="fas fa-play text-[10px]"></i>';
                healthRunning = false;
            } else {
                if (healthSeconds <= 0) { resetHealthTimer(); }
                container.classList.remove('alarm-ringing');
                healthRunning = true;
                btn.innerHTML = '<i class="fas fa-pause text-[10px]"></i>';
                healthTimer = setInterval(() => {
                    healthSeconds--;
                    if (healthSeconds <= 0) {
                        clearInterval(healthTimer);
                        healthRunning = false;
                        healthSeconds = 0;
                        btn.innerHTML = '<i class="fas fa-play text-[10px]"></i>';
                        triggerHealthAlarm();
                    }
                    updateHealthDisplay();
                }, 1000);
            }
        }

        function resetHealthTimer() {
            clearInterval(healthTimer);
            healthRunning = false;
            healthSeconds = 20 * 60;
            document.getElementById('health-toggle').innerHTML = '<i class="fas fa-play text-[10px]"></i>';
            document.getElementById('health-timer-container').classList.remove('alarm-ringing');
            updateHealthDisplay();
        }

        function setHealthPreset(mins) {
            clearInterval(healthTimer);
            healthRunning = false;
            healthSeconds = mins * 60;
            document.getElementById('health-toggle').innerHTML = '<i class="fas fa-play text-[10px]"></i>';
            document.getElementById('health-timer-container').classList.remove('alarm-ringing');
            updateHealthDisplay();
        }

        function triggerHealthAlarm() {
            document.getElementById('health-timer-container').classList.add('alarm-ringing');
            showToast("Health Alert: Time for a break!");
            
            // Audible Tone using Web Audio API
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                const playTone = (freq, start, duration) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                    
                    gain.gain.setValueAtTime(0, ctx.currentTime + start);
                    gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + start + 0.05);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + duration);
                    
                    osc.start(ctx.currentTime + start);
                    osc.stop(ctx.currentTime + start + duration);
                };

                // Play a "Beep-Boop" sequence
                playTone(880, 0, 0.4);   // A5
                playTone(1108.73, 0.4, 0.6); // C#6
            } catch (e) {
                console.error("Audio playback failed", e);
            }
        }

        function initWorldClock() {
            const cities = [
                { name: 'London', zone: 'Europe/London' },
                { name: 'New York', zone: 'America/New_York' },
                { name: 'Tokyo', zone: 'Asia/Tokyo' },
                { name: 'Dubai', zone: 'Asia/Dubai' }
            ];
            const container = document.getElementById('world-clocks');
            const updateClocks = () => {
                const now = new Date();
                container.innerHTML = '';
                cities.forEach(city => {
                    const cityDate = new Date(now.toLocaleString('en-US', { timeZone: city.zone }));
                    const localDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
                    const diffMs = cityDate - localDate;
                    const diffHrs = Math.round(diffMs / (1000 * 60 * 60) * 10) / 10;
                    const diffStr = diffHrs === 0 ? 'Same' : (diffHrs > 0 ? `+${diffHrs}` : `${diffHrs}`) + 'h';
                    const hDeg = (cityDate.getHours() % 12) * 30 + cityDate.getMinutes() * 0.5;
                    const mDeg = cityDate.getMinutes() * 6;
                    const sDeg = cityDate.getSeconds() * 6;

                    const div = document.createElement('div');
                    div.className = 'bg-black/20 rounded-xl p-2.5 border border-white/5 flex items-center gap-3';
                    div.innerHTML = `
                        <div class="analog-clock flex-shrink-0">
                            <div class="clock-hand hour-hand" style="transform: translateX(-50%) rotate(${hDeg}deg)"></div>
                            <div class="clock-hand min-hand" style="transform: translateX(-50%) rotate(${mDeg}deg)"></div>
                            <div class="clock-hand sec-hand" style="transform: translateX(-50%) rotate(${sDeg}deg)"></div>
                            <div class="clock-center"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-0.5">
                                <span class="text-[10px] font-black text-white uppercase tracking-tight truncate">${city.name}</span>
                                <span class="text-[8px] font-bold text-accent px-1.5 py-0.5 bg-accent/10 rounded-md border border-accent/20">${diffStr}</span>
                            </div>
                            <div class="text-[9px] font-mono text-slate-500">${cityDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true })}</div>
                        </div>`;
                    container.appendChild(div);
                });
            };
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        window.setActiveSite = (idx) => {
            state.activeIdx = idx;
            const targetUrl = state.sites[idx];
            const targetTitle = state.titles[idx];
            
            // Display URL update
            document.getElementById('current-url-display').textContent = targetUrl;

            // Logic: exception for Vividh Bharati (typically slot 4 or based on title)
            if (targetTitle.toLowerCase().includes('vividh') || targetUrl.includes('akashvani')) {
                // Open in NEW TAB for radio to keep playing even if dashboard is used for other things
                window.open(targetUrl, '_blank');
                showToast("Opening radio in new tab for playback...");
            } else {
                // Load in CENTRAL TILE
                document.getElementById('main-frame').src = targetUrl;
            }
            
            updateState();
        };

        window.saveNote = () => {
            const txt = document.getElementById('scratchpad').value.trim();
            if(!txt) return;
            state.history.unshift({ id: Date.now(), content: txt, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            document.getElementById('scratchpad').value = "";
            state.notes = "";
            showToast("Note saved");
            updateState();
        };

        window.deleteNote = (id) => { state.history = state.history.filter(n => n.id !== id); updateState(); };

        window.toggleScratchpadMode = () => {
            const isView = document.getElementById('right-sidebar').classList.toggle('view-mode');
            const btn = document.getElementById('scratchpad-mode-btn');
            btn.innerHTML = isView ? '<i class="fas fa-edit mr-1"></i>Edit' : '<i class="fas fa-eye mr-1"></i>View';
            if (isView) btn.classList.add('text-accent'); else btn.classList.remove('text-accent');
        };

        function renderHistory() {
            const container = document.getElementById('note-history');
            container.innerHTML = state.history.length === 0 ? '<div class="text-[10px] text-slate-600 italic p-4 text-center">No saved notes</div>' : '';
            state.history.forEach(note => {
                const div = document.createElement('div');
                div.className = 'bg-white/5 border border-white/5 rounded-xl p-3 relative group hover:border-accent/30 transition-all';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[8px] font-black text-slate-500 uppercase">${note.timestamp}</span>
                        <button onclick="deleteNote(${note.id})" class="opacity-0 group-hover:opacity-100 text-[10px] text-rose-500 hover:text-rose-400 transition-all"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="text-[10px] text-slate-300 font-mono whitespace-pre-wrap break-words">${note.content}</div>`;
                container.appendChild(div);
            });
        }

        function renderNav() {
            const container = document.getElementById('nav-slots');
            container.innerHTML = '';
            state.sites.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center p-3 rounded-xl border transition-all ${state.activeIdx === i ? 'active-nav' : 'bg-white/5 border-transparent'}`;
                btn.onclick = () => setActiveSite(i);
                btn.innerHTML = `<span class="text-[11px] font-bold">${state.titles[i]}</span>`;
                container.appendChild(btn);
            });
        }

        window.refreshFrame = () => { document.getElementById('main-frame').src += ''; };
        window.openExternal = () => { window.open(state.sites[state.activeIdx], '_blank'); };
        window.analyzeSite = () => { showToast("Analyzing site..."); };

        window.onload = () => {
            setTheme(state.theme || 'dark');
            setAccent(state.accent || '#4f46e5');
            initCalendar();
            initCalc();
            initWorldClock();
            initCurrency();
            updateHealthDisplay();
            
            // Set initial tool
            document.getElementById('tool-selector').value = state.activeTool || 'world-time';
            switchTool(state.activeTool || 'world-time');
            
            renderNav();
            renderHistory();
            
            // Initial load of the current active site in the display
            const initialUrl = state.sites[state.activeIdx];
            document.getElementById('current-url-display').textContent = initialUrl;
            
            // Special handling for initial load: if radio is active, load a default or the radio depending on user preference
            // For dashboard utility, we load the site into the frame if it's not the radio
            if (!initialUrl.includes('akashvani')) {
                document.getElementById('main-frame').src = initialUrl;
            } else {
                // If the radio is "active" on load, load the first non-radio site to the frame
                const firstNonRadioIdx = state.sites.findIndex(s => !s.includes('akashvani'));
                if (firstNonRadioIdx !== -1) {
                    document.getElementById('main-frame').src = state.sites[firstNonRadioIdx];
                }
            }
            
            const scratch = document.getElementById('scratchpad');
            scratch.value = state.notes || "";
            scratch.oninput = (e) => { state.notes = e.target.value; localStorage.setItem('omni_dashboard_state', JSON.stringify(state)); };
            
            const runConvert = () => {
                const v = parseFloat(document.getElementById('unit-input').value);
                const unit = document.getElementById('unit-from').value;
                const res = document.getElementById('unit-result');
                if(isNaN(v)) { res.innerHTML = "<span>-</span><span>-</span><span>-</span>"; return; }
                
                let meters = unit === 'ft' ? v * 0.3048 : unit === 'in' ? v * 0.0254 : v;
                let feet = meters / 0.3048;
                let inches = meters / 0.0254;

                res.innerHTML = `
                    <span class="flex flex-col items-center">
                        <span class="text-[7px] text-slate-500 uppercase font-black">FT</span>
                        <span>${feet.toFixed(1)}</span>
                    </span>
                    <span class="w-px h-4 bg-white/5 self-center"></span>
                    <span class="flex flex-col items-center">
                        <span class="text-[7px] text-slate-500 uppercase font-black">IN</span>
                        <span>${inches.toFixed(1)}</span>
                    </span>
                    <span class="w-px h-4 bg-white/5 self-center"></span>
                    <span class="flex flex-col items-center">
                        <span class="text-[7px] text-slate-500 uppercase font-black">M</span>
                        <span>${meters.toFixed(2)}</span>
                    </span>
                `;
            };
            document.getElementById('unit-input').oninput = runConvert;
            document.getElementById('unit-from').onchange = runConvert;
        };
    </script>
</body>
</html>
